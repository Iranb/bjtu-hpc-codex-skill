  short_description: "Submit and verify BJTU HPC GPU jobs"
  default_prompt: "Use $bjtu-hpc-submit to refresh auth, upload my script or data, preflight native sbatch runability with ordinary 1GPU/6CPU shapes and 1GPU/4CPU resource-wait fallback, low-VRAM GPU-sharing when each child stays below 16GB, and 2GPU-to-1GPU compatibility fallback, fill selected accounts with GPU jobs, create or update scheduled queue-monitor heartbeats for timely refill, verify Slurm CPU/GRES allocation and pending reasons, and monitor job status with GPU counts."
